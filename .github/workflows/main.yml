env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Ghost Writer Bot

on:
  schedule:
    - cron: '0 0 * * *'   # Every midnight UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-genai supabase requests

      - name: Run Ghost Writer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
        run: python ghost_writer.py

      - name: Commit and push changes
        run: |
          git config --global user.name  'GhostBot'
          git config --global user.email 'bot@raappo.cf'
          git add assets/
          git add posts/
          git add index.html
          git add .
          git commit -m "Intelligence Update — $(date +'%Y-%m-%d')" || exit 0
          git push
